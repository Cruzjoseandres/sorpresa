<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Una sorpresa especial por el Día de la Mujer.">
    <title>Para Ti, Mi Princesa</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars" id="stars-container"></div>
    <div class="content">
        <h1 class="glow-text">Feliz Día de la Mujer, Mi Amor</h1>
        <p class="subtitle">Eres el tulipán más hermoso de mi jardín...</p>
    </div>
    
    <div class="garden">
        <!-- Tulipan 1 -->
        <div class="tulip t1">
            <div class="flower">
                <div class="petal petal-left"></div>
                <div class="petal petal-right"></div>
                <div class="petal petal-center"></div>
            </div>
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
        </div>
        
        <!-- Tulipan 2 -->
        <div class="tulip t2">
            <div class="flower">
                <div class="petal petal-left"></div>
                <div class="petal petal-right"></div>
                <div class="petal petal-center"></div>
            </div>
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
        </div>

        <!-- Tulipan 3 (Medio) -->
        <div class="tulip t3">
            <div class="flower">
                <div class="petal petal-left"></div>
                <div class="petal petal-right"></div>
                <div class="petal petal-center"></div>
            </div>
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
        </div>
        
        <!-- Tulipan 4 -->
        <div class="tulip t4">
            <div class="flower">
                <div class="petal petal-left"></div>
                <div class="petal petal-right"></div>
                <div class="petal petal-center"></div>
            </div>
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
        </div>

        <!-- Tulipan 5 -->
        <div class="tulip t5">
            <div class="flower">
                <div class="petal petal-left"></div>
                <div class="petal petal-right"></div>
                <div class="petal petal-center"></div>
            </div>
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
